name: Build and release desktop apps

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            release-script: release:mac
          - platform: Windows
            os: windows-latest
            release-script: release:win
          - platform: Linux
            os: ubuntu-latest
            release-script: release:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup latest Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Build app
        run: bun run build

      - name: Package and publish
        run: bun run ${{ matrix.release-script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
